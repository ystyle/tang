[dependencies]
  "sonyflake" = "1.0.9"
  "opencj::multipart" = "0.1.3"
  "cjpminfo" = "1.2.0"

[package]
  cjc-version = "1.1.0"
  compile-option = "-O2 -Woff unused"
  description = "一个轻量级的web框架"
  link-option = ""
  name = "tang"
  output-type = "static"
  src-dir = "src"
  target-dir = ""
  version = "1.0.0"
  include = ["src"]
  exclude = ["examples/basic/results.csv"]
  license = ["MulanPSL2"]
  authors = ["ystyle"]
  repository = ["https://atomgit.com/ystyle/tang"]

[target.x86_64-unknown-linux-gnu.bin-dependencies]
  path-option = ["${CANGJIE_STDX_PATH}"]
[target.x86_64-apple-darwin.bin-dependencies]
  path-option = ["${CANGJIE_STDX_PATH}"]
[target.x86_64-w64-mingw32.bin-dependencies]
  path-option = ["${CANGJIE_STDX_PATH}"]

[profile.build]
incremental = false
